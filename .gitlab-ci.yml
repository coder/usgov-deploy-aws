# =============================================================================
# Root CI/CD Pipeline — coder4gov.com
# =============================================================================
#
# GitLab instance: gitlab.coder4gov.com (self-hosted)
# Repository:      gov.demo.coder.com
#
# This pipeline orchestrates three sub-pipelines:
#
#   1. infra/terraform/   — Terraform validation (fmt, validate, tflint, tfsec, plan)
#   2. images/coder-fips/ — Build Coder from source with FIPS 140-3 (Go 1.24+ native)
#   3. images/            — Build FIPS workspace images (base-fips, desktop-fips)
#
# Pipeline runs on:
#   - Every merge request (MR)
#   - Every push to main
#   - Manual trigger via GitLab UI (for Coder FIPS builds with custom version)
#
# =============================================================================

stages:
  - validate
  - build
  - push

# ---------------------------------------------------------------------------
# Global variables available to all included pipelines
# ---------------------------------------------------------------------------
variables:
  # ECR registry — override per-environment via CI/CD variables
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
  AWS_DEFAULT_REGION: "us-gov-west-1"

# ---------------------------------------------------------------------------
# Include sub-pipelines
#
# Order matters: GitLab merges these top-to-bottom. Jobs in each file
# reference the stages defined above.
# ---------------------------------------------------------------------------
include:
  # Terraform validation — runs on every MR/push when infra/ files change
  - local: 'infra/terraform/.gitlab-ci.yml'

  # Coder FIPS build — builds the Coder server binary + image with FIPS 140-3
  - local: 'images/coder-fips/.gitlab-ci.yml'

  # Workspace images — builds base-fips and desktop-fips images
  - local: 'images/build.gitlab-ci.yml'
