# OBS-001 → OBS-005: Coder Observability Stack HelmRelease
# Grafana + Loki + Prometheus – pre-configured for Coder metrics and logs
# Loki stores logs in S3 via IRSA; Grafana exposed at grafana.dev.coder4gov.com
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder-observability
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: coder-observability
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: coder-observability
        namespace: flux-system
  values:
    # OBS-001: Loki log aggregation with S3 backend
    loki:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: "" # TODO: Fill from terraform output – loki_irsa_role_arn
      storage:
        type: s3
        s3:
          bucketName: "" # TODO: Fill from terraform output – loki_s3_bucket_name
          region: us-west-2 # TODO: Override for GovCloud (us-gov-west-1)

    # OBS-002: Grafana dashboards exposed via ALB Ingress
    grafana:
      ingress:
        enabled: true
        ingressClassName: alb
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          alb.ingress.kubernetes.io/certificate-arn: "" # TODO: Fill from terraform output – acm_wildcard_cert_arn
          alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
        hosts:
          - grafana.dev.coder4gov.com

    # OBS-004: Pin to system node pool
    nodeSelector:
      scheduling.coder.com/pool: system
    # OBS-005: Tolerate system-node taint
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
        effect: NoSchedule
