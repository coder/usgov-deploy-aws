# CDR-003: Coder RDS database credentials
# Pulls coder4gov/rds-master-password from AWS Secrets Manager
# via ClusterSecretStore "aws-secrets-manager" (Layer 4)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coder-db-credentials
  namespace: coder
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: coder-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: coder4gov/rds-master-password
