# AI-003, AI-004: LiteLLM API keys for OpenAI and Gemini models
# Pulls from AWS Secrets Manager into a single Kubernetes secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-api-keys
  namespace: litellm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: litellm-api-keys
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: coder4gov/openai-api-key
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: coder4gov/gemini-api-key
