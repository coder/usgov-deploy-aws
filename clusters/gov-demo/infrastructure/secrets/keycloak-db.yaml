# KC-003: Keycloak RDS database credentials
# Pulls coder4gov/rds-master-password from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-db-credentials
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: keycloak-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: coder4gov/rds-master-password
