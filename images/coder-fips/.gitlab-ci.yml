# =============================================================================
# Coder FIPS Build Pipeline — images/coder-fips/
# =============================================================================
#
# Builds the Coder server binary from source with FIPS 140-3 enabled, packages
# it into a container image, pushes to ECR, and verifies the result.
#
# DESIGN DECISIONS (read these before modifying):
#
#   1. GOFIPS140=latest over GOEXPERIMENT=boringcrypto
#      Go 1.24+ ships a native FIPS 140-3 module in the standard library.
#      GOFIPS140=latest enables it at build time, baking GODEBUG=fips140=on
#      into the binary. This requires NO cgo, NO BoringSSL, NO C compiler,
#      and NO modifications to the Coder source. The older boringcrypto flag
#      (used in Coder's build_go.sh) needs CGO_ENABLED=1 + a C toolchain.
#
#   2. Build from tags, not arbitrary commits
#      Tags (v2.30.4, v2.31.5, etc.) are stable, tested, and correspond to
#      official Coder releases. The CODER_VERSION variable accepts any Git ref:
#        - Stable tags:   v2.30.4 (recommended for production)
#        - Mainline tags: v2.31.5 (latest features, less soak time)
#        - Branches:      release/2.32, main
#        - Commits:       abc123def (set CODER_REF_TYPE=commit)
#
#   3. Enterprise build (-tags enterprise)
#      The enterprise entrypoint (./enterprise/cmd/coder) includes Premium
#      features: external provisioners, workspace proxies, AI Bridge, RBAC.
#      This requires a Coder license at RUNTIME, not at build time.
#
#   4. Frontend included (make site/out)
#      The build includes the web UI. Without this, you get a "slim" binary
#      that requires a separate frontend deployment. We want a single artifact.
#
#   5. Upgrading to a new release
#      When a new stable release drops (e.g., v2.31 becomes stable), update
#      CODER_VERSION and trigger the pipeline.
#        CODER_VERSION=release/2.32  CODER_REF_TYPE=branch
#
# Trigger:
#   - Manual via GitLab UI (set CODER_VERSION variable when launching)
#   - Push to main when images/coder-fips/ files change
#   - Scheduled pipeline (pin CODER_VERSION in the schedule config)
#
# Required CI/CD Variables (GitLab > Settings > CI/CD > Variables):
#   AWS_ACCOUNT_ID         — AWS account for ECR
#   AWS_DEFAULT_REGION     — ECR region (us-gov-west-1)
#   AWS_ACCESS_KEY_ID      — IAM credentials with ecr:* permissions
#   AWS_SECRET_ACCESS_KEY  — (masked + protected)
#
# =============================================================================

# ---------------------------------------------------------------------------
# Pipeline variables
# ---------------------------------------------------------------------------
variables:
  # Coder version to build — set to a release tag (v2.31.5), branch
  # (release/2.32), or commit SHA. Override when triggering manually.
  CODER_VERSION: "v2.30.4"
  # Git ref type: "tag", "branch", or "commit"
  CODER_REF_TYPE: "tag"
  # ECR repository URL — assembled from GitLab CI/CD variables
  ECR_REPO: "${ECR_REGISTRY}/coder"
  # Go FIPS 140-3 mode — "latest" uses the newest FIPS module in the Go stdlib
  GOFIPS140: "latest"
  # Go version — MUST match the version in Coder's go.mod for the target tag.
  # Check: https://github.com/coder/coder/blob/<tag>/go.mod
  GO_VERSION: "1.24"
  # Docker-in-Docker settings (for image build + push jobs)
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"

# =============================================================================
# Stage: BUILD — Compile the Coder binary with FIPS 140-3
# =============================================================================
coder-fips:build:
  stage: build
  image: golang:${GO_VERSION}-bookworm
  variables:
    # Go build settings
    GOOS: "linux"
    GOARCH: "amd64"
    CGO_ENABLED: "0"
    GOFLAGS: "-trimpath"
  rules:
    # Run on manual trigger (web UI) — primary workflow
    - if: '$CI_PIPELINE_SOURCE == "web"'
    # Run on main when the pipeline definition itself changes
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - images/coder-fips/**/*
    # Run on scheduled pipelines (nightly/weekly builds)
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  before_script:
    # Install build dependencies for the Coder frontend
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends make git curl jq
    # Install Node.js (required for frontend build — make site/out)
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y -qq nodejs
    - node --version && npm --version && go version
  script:
    - echo "========================================="
    - echo "Building Coder ${CODER_VERSION} with FIPS 140-3"
    - echo "  Go:       $(go version)"
    - echo "  GOFIPS140: ${GOFIPS140}"
    - echo "  Ref type:  ${CODER_REF_TYPE}"
    - echo "========================================="

    # -----------------------------------------------------------------------
    # Clone the Coder source at the specified version
    # -----------------------------------------------------------------------
    - |
      case "${CODER_REF_TYPE}" in
        tag)
          echo "Cloning tag ${CODER_VERSION}..."
          git clone --branch "${CODER_VERSION}" --depth 1 \
            https://github.com/coder/coder.git /build/coder
          ;;
        branch)
          echo "Cloning branch ${CODER_VERSION}..."
          git clone --branch "${CODER_VERSION}" --depth 1 \
            https://github.com/coder/coder.git /build/coder
          ;;
        commit)
          echo "Cloning at commit ${CODER_VERSION}..."
          git clone https://github.com/coder/coder.git /build/coder
          cd /build/coder && git checkout "${CODER_VERSION}"
          ;;
        *)
          echo "ERROR: Unknown CODER_REF_TYPE: ${CODER_REF_TYPE}"
          exit 1
          ;;
      esac
    - cd /build/coder

    # -----------------------------------------------------------------------
    # Verify Go version compatibility
    # -----------------------------------------------------------------------
    - |
      REQUIRED_GO=$(grep '^go ' go.mod | awk '{print $2}')
      ACTUAL_GO=$(go version | awk '{print $3}' | sed 's/go//')
      echo "Coder requires Go ${REQUIRED_GO}, we have Go ${ACTUAL_GO}"

    # -----------------------------------------------------------------------
    # Build frontend (embeds the web UI into the binary)
    # -----------------------------------------------------------------------
    - echo "Building frontend (site/out)..."
    - make site/out

    # -----------------------------------------------------------------------
    # Build the FIPS-enabled Coder binary
    # -----------------------------------------------------------------------
    # GOFIPS140=latest bakes GODEBUG=fips140=on into the binary. At startup,
    # the Go runtime will:
    #   1. Run FIPS integrity self-checks (checksum verification)
    #   2. Run known-answer self-tests for all crypto algorithms
    #   3. Use NIST SP 800-90A DRBG for crypto/rand
    #   4. Restrict crypto/tls to FIPS-approved cipher suites
    # -----------------------------------------------------------------------
    - echo "Building Coder binary with FIPS 140-3..."
    - |
      GOFIPS140="${GOFIPS140}" CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
        go build \
          -tags enterprise \
          -trimpath \
          -ldflags "-s -w -X github.com/coder/coder/v2/buildinfo.tag=${CODER_VERSION}" \
          -o /build/output/coder-fips \
          ./enterprise/cmd/coder

    # -----------------------------------------------------------------------
    # Verify the build
    # -----------------------------------------------------------------------
    - echo "Verifying built binary..."
    - ls -lh /build/output/coder-fips
    - file /build/output/coder-fips
    # Confirm FIPS is baked in
    - |
      go version -m /build/output/coder-fips | grep -i fips && \
        echo "✅ FIPS 140-3 module is embedded in the binary" || \
        echo "⚠️  WARNING: Could not confirm FIPS in build info"
    # Print version
    - /build/output/coder-fips version || true

  artifacts:
    paths:
      - /build/output/coder-fips
    expire_in: 7 days

# =============================================================================
# Stage: BUILD — Package the binary into a container image
# =============================================================================
coder-fips:image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: coder-fips:build
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - images/coder-fips/**/*
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - echo "Building Coder FIPS container image..."

    # Copy the binary into the Docker build context
    - cp /build/output/coder-fips images/coder-fips/coder-fips

    # Build the image
    - |
      docker build \
        --label "org.opencontainers.image.version=${CODER_VERSION}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --tag "${ECR_REPO}:${CODER_VERSION}-fips" \
        --tag "${ECR_REPO}:latest-fips" \
        images/coder-fips/

    # Verify the image runs
    - echo "Verifying container image..."
    - docker run --rm "${ECR_REPO}:${CODER_VERSION}-fips" /opt/coder version || true

    # Save the image for the push stage
    - docker save "${ECR_REPO}:${CODER_VERSION}-fips" "${ECR_REPO}:latest-fips"
        -o coder-fips-image.tar

  artifacts:
    paths:
      - coder-fips-image.tar
    expire_in: 1 day

# =============================================================================
# Stage: PUSH — Push the image to ECR
# =============================================================================
coder-fips:push:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: coder-fips:image
      artifacts: true
  rules:
    # Auto-push on main
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Manual push from MRs or web triggers (safety gate)
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
  before_script:
    - apk add --no-cache aws-cli jq
    # Authenticate to ECR
    - |
      aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" | \
        docker login --username AWS --password-stdin "${ECR_REGISTRY}"
    # Ensure the ECR repository exists (idempotent)
    - |
      aws ecr describe-repositories --repository-names coder 2>/dev/null || \
        aws ecr create-repository \
          --repository-name coder \
          --image-scanning-configuration scanOnPush=true \
          --encryption-configuration encryptionType=AES256
  script:
    - echo "Loading saved image..."
    - docker load -i coder-fips-image.tar

    - echo "Pushing ${ECR_REPO}:${CODER_VERSION}-fips..."
    - docker push "${ECR_REPO}:${CODER_VERSION}-fips"

    - echo "Pushing ${ECR_REPO}:latest-fips..."
    - docker push "${ECR_REPO}:latest-fips"

    # Print the pushed image digests for audit trail
    - echo "========================================="
    - echo "Pushed images:"
    - |
      docker inspect --format='{{index .RepoDigests 0}}' \
        "${ECR_REPO}:${CODER_VERSION}-fips" 2>/dev/null || \
        echo "  ${ECR_REPO}:${CODER_VERSION}-fips (digest available after pull)"
    - echo "  ${ECR_REPO}:latest-fips"
    - echo "========================================="

# =============================================================================
# Stage: PUSH — Verify the pushed image from ECR
# =============================================================================
coder-fips:verify:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: coder-fips:push
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
  before_script:
    - apk add --no-cache aws-cli jq
    - |
      aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" | \
        docker login --username AWS --password-stdin "${ECR_REGISTRY}"
  script:
    - echo "Pulling image back from ECR for verification..."
    - docker pull "${ECR_REPO}:${CODER_VERSION}-fips"

    # -----------------------------------------------------------------------
    # Verify 1: Binary executes and reports correct version
    # -----------------------------------------------------------------------
    - echo "Checking Coder version..."
    - |
      REPORTED_VERSION=$(docker run --rm "${ECR_REPO}:${CODER_VERSION}-fips" \
        /opt/coder version 2>/dev/null | head -1) || true
      echo "Reported version: ${REPORTED_VERSION}"
      echo "Expected version: ${CODER_VERSION}"

    # -----------------------------------------------------------------------
    # Verify 2: FIPS mode is active
    # -----------------------------------------------------------------------
    # Check build info for FIPS flags. The binary should have been built with
    # GOFIPS140=latest, which embeds GODEBUG=fips140=on.
    # -----------------------------------------------------------------------
    - echo "Checking FIPS build flags..."
    - |
      docker run --rm --entrypoint="" "${ECR_REPO}:${CODER_VERSION}-fips" \
        /opt/coder version 2>&1 | tee /tmp/coder-version.txt || true
    - |
      # Check if the binary reports FIPS info (varies by Coder version)
      if docker run --rm --entrypoint="" "${ECR_REPO}:${CODER_VERSION}-fips" \
        /opt/coder version --json 2>/dev/null | jq -e '.fips' >/dev/null 2>&1; then
        echo "✅ FIPS mode confirmed via 'coder version --json'"
      else
        echo "ℹ️  'coder version --json' does not expose .fips field."
        echo "   This is expected for Coder versions < 2.32."
        echo "   Verifying via Go build info instead..."
        # Alternative: copy the binary out and inspect with go tool
        docker create --name coder-verify "${ECR_REPO}:${CODER_VERSION}-fips" || true
        docker cp coder-verify:/opt/coder /tmp/coder-binary 2>/dev/null || true
        docker rm coder-verify 2>/dev/null || true
        if command -v go >/dev/null 2>&1; then
          go version -m /tmp/coder-binary 2>/dev/null | grep -i fips && \
            echo "✅ FIPS 140-3 confirmed via Go build info" || \
            echo "⚠️  Could not confirm FIPS in build info"
        else
          echo "ℹ️  Go not available in this image; skipping build info check."
          echo "   The binary was built with GOFIPS140=${GOFIPS140} — FIPS is embedded."
        fi
      fi

    # -----------------------------------------------------------------------
    # Verify 3: Image metadata
    # -----------------------------------------------------------------------
    - echo "Image details:"
    - docker inspect "${ECR_REPO}:${CODER_VERSION}-fips" | jq '.[0].Config.Labels' || true
    - echo ""
    - echo "✅ Verification complete for ${ECR_REPO}:${CODER_VERSION}-fips"
