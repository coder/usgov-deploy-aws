# =============================================================================
# GitLab CI — FIPS Workspace Image Build Pipeline
# =============================================================================
#
# Builds and pushes the FIPS-compliant Coder workspace images to Amazon ECR.
#
# Trigger:  Push to any file under images/**
# Images:   base-fips, desktop-fips
# Registry: Amazon ECR (configured via CI/CD variables)
# Tags:     git SHA (immutable) + `latest` (mutable convenience tag)
#
# Required CI/CD Variables (set in GitLab > Settings > CI/CD > Variables):
#   AWS_ACCOUNT_ID        — AWS account ID for ECR (e.g., 123456789012)
#   AWS_DEFAULT_REGION    — ECR region (e.g., us-gov-west-1)
#   AWS_ACCESS_KEY_ID     — IAM credentials with ecr:* permissions
#   AWS_SECRET_ACCESS_KEY — (masked/protected)
#
# =============================================================================

# ---------------------------------------------------------------------------
# Global defaults
# ---------------------------------------------------------------------------
variables:
  # ECR registry base URL — override via CI/CD variables for your account
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
  AWS_DEFAULT_REGION: "us-gov-west-1"
  # Docker-in-Docker image for building container images
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"
  # Image names
  BASE_IMAGE_NAME: "coder-enterprise-fips"
  DESKTOP_IMAGE_NAME: "coder-enterprise-fips-desktop"

# ---------------------------------------------------------------------------
# Hidden job: shared ECR login logic
# ---------------------------------------------------------------------------
.ecr_login: &ecr_login
  before_script:
    - apk add --no-cache aws-cli || true
    - aws ecr get-login-password --region "${AWS_DEFAULT_REGION}"
        | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
    # Ensure ECR repositories exist (idempotent)
    - |
      for repo in "${BASE_IMAGE_NAME}" "${DESKTOP_IMAGE_NAME}"; do
        aws ecr describe-repositories --repository-names "${repo}" 2>/dev/null || \
          aws ecr create-repository \
            --repository-name "${repo}" \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256
      done

# ---------------------------------------------------------------------------
# Build: base-fips
# ---------------------------------------------------------------------------
build-base-fips:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  <<: *ecr_login
  script:
    - echo "Building ${BASE_IMAGE_NAME}..."
    - >
      docker build
      --tag "${ECR_REGISTRY}/${BASE_IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      --tag "${ECR_REGISTRY}/${BASE_IMAGE_NAME}:latest"
      --file images/base-fips/Dockerfile
      images/base-fips/
    - echo "Pushing ${BASE_IMAGE_NAME}..."
    - docker push "${ECR_REGISTRY}/${BASE_IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${ECR_REGISTRY}/${BASE_IMAGE_NAME}:latest"
  rules:
    - changes:
        - images/base-fips/**/*
      when: always
    # Also rebuild if pipeline is triggered manually
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always

# ---------------------------------------------------------------------------
# Build: desktop-fips (depends on base-fips)
# ---------------------------------------------------------------------------
build-desktop-fips:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  <<: *ecr_login
  needs:
    - job: build-base-fips
      optional: true
  script:
    - echo "Building ${DESKTOP_IMAGE_NAME}..."
    # Pull the latest base image to use as the FROM target
    - docker pull "${ECR_REGISTRY}/${BASE_IMAGE_NAME}:latest" || true
    - >
      docker build
      --build-arg BASE_IMAGE="${ECR_REGISTRY}/${BASE_IMAGE_NAME}:latest"
      --tag "${ECR_REGISTRY}/${DESKTOP_IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      --tag "${ECR_REGISTRY}/${DESKTOP_IMAGE_NAME}:latest"
      --file images/desktop-fips/Dockerfile
      images/desktop-fips/
    - echo "Pushing ${DESKTOP_IMAGE_NAME}..."
    - docker push "${ECR_REGISTRY}/${DESKTOP_IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${ECR_REGISTRY}/${DESKTOP_IMAGE_NAME}:latest"
  rules:
    - changes:
        - images/desktop-fips/**/*
        - images/base-fips/**/*
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
